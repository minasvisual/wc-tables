<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONPlaceholder Table Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        .status-bar {
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #3b82f6;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <wc-nav></wc-nav>
        <header>
            <h1>Server-Side Filtering Demo</h1>
            <p>The data below is fetched dynamically from the <strong>JSONPlaceholder API</strong>.</p>
        </header>

        <div class="status-bar">
            <span>API Status: <strong>Online</strong></span>
            <span id="loadingStatus">Loading data...</span>
        </div>

        <wc-table id="placeholderTable" server-side>
            <wc-table-row col="price" type="currency" col-label="Preço"></wc-table-row>
            <wc-table-row col="thumbnail" type="image"></wc-table-row>

            <h2 slot="toolbar-left" style="margin:0">Products (DummyJSON)</h2>

            <template slot="right-actions">
                <button data-action="view" title="See Details (See console)">🔍</button>
            </template>

            <div slot="after" style="padding: 1rem; border-top: 1px solid #e2e8f0; background: #fff;">
                <wc-paginate id="placeholderPaginate" total="0" page-size="10"></wc-paginate>
            </div>

        </wc-table>
    </div>

    <script type="module" src="./wc-nav.js"></script>
    <script type="module" src="../src/wc-table.js"></script>
    <script type="module" src="../src/wc-paginate.js"></script>
    <script type="module">
        import { Config } from '../src/config.js';

        // Register currency plugin (already provided by wc‑tables, but ensure it's available)
        // No extra registration needed for built‑in plugins.

        const table = document.getElementById('placeholderTable');
        const paginate = document.getElementById('placeholderPaginate');
        const loadingStatus = document.getElementById('loadingStatus');

        // Fetch products with server‑side pagination (DummyJSON)
        async function fetchProducts(page = 1, limit = 10, query = '') {
            loadingStatus.textContent = 'Fetching products...';
            const skip = (page - 1) * limit;

            // DummyJSON uses /search for filtering
            const url = query
                ? `https://dummyjson.com/products/search?q=${encodeURIComponent(query)}&limit=${limit}&skip=${skip}`
                : `https://dummyjson.com/products?limit=${limit}&skip=${skip}`;
            try {
                const response = await fetch(url);
                const data = await response.json(); // {products:[], total:..., skip:..., limit:...}
                // Populate table with current page data
                table.data = data.products.map(p => ({
                    id: p.id,
                    thumbnail: p.thumbnail,
                    title: p.title,
                    price: p.price,
                    category: p.category
                }));
                // Update pagination attributes
                paginate.setAttribute('total', String(data.total));
                paginate.setAttribute('page', String(page));
                loadingStatus.textContent = `${data.products.length} products shown (page ${page})`;
            } catch (err) {
                loadingStatus.textContent = 'Error fetching products.';
                console.error(err);
            }
        }

        // Listen to pagination changes (server‑side)
        paginate.addEventListener('page-changed', (e) => {
            const { page } = e.detail;
            const limit = Number(paginate.getAttribute('page-size')) || 10;
            fetchProducts(page, limit);
        });

        // Debounce helper for search/filter (server‑side)
        let filterTimeout;
        table.addEventListener('before-filter', (e) => {
            const query = e.detail.query;
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                const limit = Number(paginate.getAttribute('page-size')) || 10;
                // Reset to first page when searching
                fetchProducts(1, limit, query);
            }, 500);
        });

        table.addEventListener('action-click', (e) => {
            console.log(`Product: ${e.detail.item.title}\nCategory: ${e.detail.item.category}`, e.detail.item);
        });

        // Initial load – first page
        fetchProducts(1, Number(paginate.getAttribute('page-size')) || 10);
    </script>
</body>

</html>
