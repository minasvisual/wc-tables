<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Features Fixture</title>
</head>
<body>
    <!-- 1. Table with inline JSON and hidden cols -->
    <wc-table id="tableAttributes" 
              data='[{"id":1,"name":"A","val":10},{"id":2,"name":"B","val":20}]'
              hidden-cols="id">
        <wc-table-row col="id"></wc-table-row>
        <wc-table-row col="name"></wc-table-row>
        <wc-table-row col="val"></wc-table-row>
    </wc-table>

    <!-- 2. Table with client-side pagination -->
    <wc-table id="tablePagination" page-size="2">
        <wc-table-row col="name"></wc-table-row>
    </wc-table>

    <!-- 3. col-label overrides header text -->
    <wc-table id="tableColLabel"
              data='[{"code":"A1","amount":100}]'>
        <wc-table-row col="code" col-label="Código"></wc-table-row>
        <wc-table-row col="amount" col-label="Valor (R$)"></wc-table-row>
    </wc-table>

    <!-- 5a. Declarative wc-table-head (wc-table-row only) -->
    <wc-table id="tableDeclHead" data='[{"k":"cell"}]'>
        <wc-table-row col="k"></wc-table-row>
        <wc-table-head>
            <wc-table-row col="k" type="badge" header-text="Active"></wc-table-row>
        </wc-table-head>
    </wc-table>

    <!-- 5. wc-table-head / wc-table-footer -->
    <wc-table id="tableHeadFoot" data='[{"x":1}]'>
        <wc-table-row col="x"></wc-table-row>
        <wc-table-head>
            <template>
                <tr><th colspan="2">Band</th></tr>
            </template>
        </wc-table-head>
        <wc-table-footer>
            <template>
                <tr><td colspan="2">Foot note</td></tr>
            </template>
        </wc-table-footer>
    </wc-table>

    <!-- 4. Standalone paginate component -->
    <wc-paginate id="standalonePaginate" total="50" page-size="10"></wc-paginate>

    <script type="module" src="../../../src/wc-table.js"></script>
    <script type="module" src="../../../src/wc-paginate.js"></script>
</body>
</html>
